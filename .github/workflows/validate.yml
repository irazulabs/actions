name: validate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  publish-to-appgallery:
    name: publish-to-appgallery / python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e publish-to-appgallery[dev]

      - name: Ruff lint
        run: ruff check publish-to-appgallery

      - name: Ruff format
        run: ruff format --check publish-to-appgallery

      - name: Mypy
        run: mypy publish-to-appgallery/src

      - name: Pytest
        run: pytest publish-to-appgallery

  update-gcs-cors:
    name: update-gcs-cors / python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e update-gcs-cors[dev]

      - name: Ruff lint
        run: ruff check update-gcs-cors

      - name: Ruff format
        run: ruff format --check update-gcs-cors

      - name: Mypy
        run: mypy update-gcs-cors/src

      - name: Pytest
        run: pytest update-gcs-cors

  composite-smoke:
    name: publish-to-appgallery / composite smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create test bundle
        shell: python
        run: |
          import zipfile

          with zipfile.ZipFile("smoke.aab", "w") as bundle:
              bundle.writestr("BundleConfig.pb", b"bundle-config")
              bundle.writestr("base/manifest/AndroidManifest.xml", b"<manifest />")

      - name: Run action
        id: publish
        uses: ./publish-to-appgallery
        with:
          artifact-path: smoke.aab
          app-id: smoke-app
          chinese-mainland-flag: '0'
          dry-run: 'true'

      - name: Verify outputs
        shell: bash
        env:
          FILE_NAME: ${{ steps.publish.outputs.artifact-file-name }}
          SIZE_BYTES: ${{ steps.publish.outputs.artifact-size-bytes }}
          SHA256: ${{ steps.publish.outputs.artifact-sha256 }}
          DRY_RUN: ${{ steps.publish.outputs.dry-run }}
          OBJECT_ID: ${{ steps.publish.outputs.object-id }}
          SUBMITTED: ${{ steps.publish.outputs.submitted }}
        run: |
          test "$FILE_NAME" = smoke.aab
          test "$SIZE_BYTES" -gt 0
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$DRY_RUN" = true
          test -z "$OBJECT_ID"
          test "$SUBMITTED" = false

  gcs-cors-composite-smoke:
    name: update-gcs-cors / composite smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create CORS policy
        shell: python
        run: |
          import json

          with open("cors.json", "w", encoding="utf-8") as policy:
              json.dump([{"origin": ["https://example.com"], "method": ["GET"]}], policy)

      - name: Run action
        id: cors
        uses: ./update-gcs-cors
        with:
          bucket: smoke-bucket
          cors-file: cors.json
          dry-run: 'true'

      - name: Verify outputs
        shell: bash
        env:
          BUCKET: ${{ steps.cors.outputs.bucket }}
          CORS_FILE: ${{ steps.cors.outputs.cors-file }}
          SHA256: ${{ steps.cors.outputs.cors-sha256 }}
          RULE_COUNT: ${{ steps.cors.outputs.rule-count }}
          DRY_RUN: ${{ steps.cors.outputs.dry-run }}
        run: |
          test "$BUCKET" = smoke-bucket
          test "$CORS_FILE" = "$GITHUB_WORKSPACE/cors.json"
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$RULE_COUNT" = 1
          test "$DRY_RUN" = true
