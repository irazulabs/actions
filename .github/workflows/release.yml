name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable semantic version tag to publish, such as v1.0.0.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: validate and publish ${{ inputs.version }}
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          [[ "$VERSION" =~ ^v[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]
          test "${VERSION#v}" = "$(python -c 'import tomllib; print(tomllib.load(open("publish-to-appgallery/pyproject.toml", "rb"))["project"]["version"])')"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$VERSION")" = "$GITHUB_SHA"
          fi

      - name: Install dependencies
        run: python -m pip install -e publish-to-appgallery[dev]

      - name: Validate action
        run: |
          ruff check publish-to-appgallery
          ruff format --check publish-to-appgallery
          mypy publish-to-appgallery/src
          pytest publish-to-appgallery

      - name: Publish tags and release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          MAJOR="${VERSION%%.*}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          VERSION_TAGS=( $(git tag --list "${MAJOR}.*" --sort=-version:refname) )
          CURRENT_VERSION="${VERSION_TAGS[0]:-}"
          if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$VERSION" ]; then
            python -c 'import sys; parse=lambda value: tuple(map(int, value[1:].split("."))); assert parse(sys.argv[2]) > parse(sys.argv[1]), f"{sys.argv[2]} must be newer than {sys.argv[1]}"' "$CURRENT_VERSION" "$VERSION"
          fi
          if git rev-parse "$MAJOR" >/dev/null 2>&1; then
            git merge-base --is-ancestor "$(git rev-list -n 1 "$MAJOR")" "$GITHUB_SHA"
          fi
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "$VERSION"
          fi
          git tag -fa "$MAJOR" -m "$MAJOR"
          git push origin "$MAJOR" --force
          gh release view "$VERSION" >/dev/null 2>&1 || \
            gh release create "$VERSION" --verify-tag --generate-notes --title "$VERSION"
          if [ "$VERSION" = v1.0.0 ]; then
            gh release edit v0.0.1 --prerelease
          fi
